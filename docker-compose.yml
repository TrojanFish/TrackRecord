services:
  trackrecord:
    build: .
    container_name: trackrecord-app
    ports:
      - "8081:8000"
    volumes:
      - ./run_page/settings.yaml:/app/config.yaml # 将本地设置挂载为容器内的默认配置
      - ./data:/app/data
      - ./run_page/static/photos:/app/run_page/static/photos
      - ./run_page/static/trophy_icons:/app/run_page/static/trophy_icons
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/app/data/data.db
      - SYNC_ON_STARTUP=true
